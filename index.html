<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozReward</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .header { width: 100%; max-width: 400px; background: rgba(255, 255, 255, 0.1); padding: 15px; border-radius: 15px; text-align: center; backdrop-filter: blur(10px); margin-bottom: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); }
        .balance-box { font-size: 24px; font-weight: bold; color: #fffb00; margin-top: 5px; }
        .card { width: 100%; max-width: 400px; background: white; color: #333; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn { background: #ff4757; color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.3s; width: 80%; margin-top: 10px; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.4); }
        .btn:active { transform: scale(0.95); }
        .scratch-area { width: 200px; height: 100px; background: #ccc; margin: 15px auto; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: #666; border-radius: 10px; cursor: pointer; border: 2px dashed #999; }
        /* Ad Banner Styling */
        .ad-container { width: 100%; max-width: 320px; height: 50px; background: #222; color: #aaa; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-top: auto; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- Header Section -->
    <div class="header">
        <h2>📱 RozReward</h2>
        <div class="balance-box">💰 <span id="balance">0</span> Coins</div>
    </div>

    <!-- Daily Check-in -->
    <div class="card">
        <h3>📅 Daily Bonus</h3>
        <p>Rozana app kholne ka inaam lo!</p>
        <button class="btn" id="checkInBtn" onclick="dailyCheckIn()">Claim 100 Coins</button>
    </div>

    <!-- Scratch Card Section -->
    <div class="card">
        <h3>⏳ Scratch & Win</h3>
        <p>Niche click karke scratch karein</p>
        <div class="scratch-area" id="scratchCard" onclick="scratchCard()">TAP TO SCRATCH</div>
    </div>

    <!-- Watch Video Ad Section -->
    <div class="card">
        <h3>📺 Watch & Earn</h3>
        <p>Ek chhota video ad dekho aur zyada kamao</p>
        <button class="btn" style="background:#2ed573; box-shadow: 0 4px 10px rgba(46, 213, 115, 0.4);" onclick="watchAd()">Watch Video Ad</button>
    </div>

    <!-- Withdraw Box -->
    <div class="card">
        <h3>💸 Withdraw Money</h3>
        <p>10,000 Coins = ₹100 Paytm/UPI</p>
        <button class="btn" style="background:#1e90ff; box-shadow: 0 4px 10px rgba(30, 144, 255, 0.4);" onclick="withdraw()">Redeem Now</button>
    </div>

    <!-- Banner Ad Placeholder (Yahan Ad Dikhega) -->
    <div class="ad-container" id="bannerAd">
        [ ADVERTISEMENT BANNER PLACEHOLDER ]
    </div>

    <script>
        // Coins database load karna (agar app band bhi ho jaye toh coins safe rahenge)
        let coins = parseInt(localStorage.getItem("userCoins")) || 0;
        document.getElementById("balance").innerText = coins;

        // 1. Daily Check-in Function
        function dailyCheckIn() {
            let lastCheck = localStorage.getItem("lastCheckIn");
            let today = new Date().toDateString();

            if (lastCheck === today) {
                alert("❌ Aaj ka bonus aap pehle hi le chuke hain! Kal dobara aana.");
            } else {
                coins += 100;
                localStorage.setItem("userCoins", coins);
                localStorage.setItem("lastCheckIn", today);
                document.getElementById("balance").innerText = coins;
                alert("🎉 Mubarak ho! 100 Coins aapke account mein jud gaye.");
                showInterstitialAd(); // Ad chalega
            }
        }

        // 2. Scratch Card Function
        function scratchCard() {
            let randomCoins = Math.floor(Math.random() * 41) + 10; // 10 se 50 ke beech random coins
            coins += randomCoins;
            localStorage.setItem("userCoins", coins);
            document.getElementById("balance").innerText = coins;
            
            document.getElementById("scratchCard").innerText = "🎁 +" + randomCoins + " Coins!";
            document.getElementById("scratchCard").style.background = "#ffeaa7";
            
            alert("✨ Scratch Se Mile: " + randomCoins + " Coins!");
            
            // Reset scratch card after 3 seconds
            setTimeout(() => {
                document.getElementById("scratchCard").innerText = "TAP TO SCRATCH";
                document.getElementById("scratchCard").style.background = "#ccc";
            }, 3000);

            showInterstitialAd(); // Ad chalega
        }

        // 3. Watch Ad Function
        function watchAd() {
            alert("🎬 Loading Video Ad... (Yahan aapka network ad chalayega)");
            // Jab ad poora khatam ho jaye tab yeh code chalega:
            setTimeout(() => {
                coins += 200;
                localStorage.setItem("userCoins", coins);
                document.getElementById("balance").innerText = coins;
                alert("✅ Video Ad dekhne ke liye 200 Coins diye gaye!");
            }, 2000); 
        }

        // 4. Withdraw Function
        function withdraw() {
            if(coins >= 10000) {
                alert("✅ Aapki withdrawal request le li gayi hai! 24 ghante mein Paytm/UPI mein mil jayenge.");
                coins -= 10000;
                localStorage.setItem("userCoins", coins);
                document.getElementById("balance").innerText = coins;
            } else {
                alert("❌ Withdrawal ke liye kam se kam 10,000 Coins chahiye!");
            }
        }

        // --- AD NETWORKS INTEGRATION CODE ---
        // Jab aap Unity Ads ya AdMob ka account banaoge, toh unka code yahan lagana hai.
        function showInterstitialAd() {
            console.log("Full Screen Ad Triggered!");
            // Real network script yahan click par popup dikhayegi
        }
    </script>
</body>
          </html>
